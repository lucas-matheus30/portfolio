<!DOCTYPE html>
<html lang="pt-br">
	<head>
		<meta charset="UTF-8">
		
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<meta name="description" content="Projeto Portfólio">
		<meta name="author" content="Lucas Matheus">
		<meta name="keywords" content="HTML, CSS, JavaScript">
		
		<link rel="icon" type="image/svg" href="/assets/img/favicon.svg" />

		<!-- Link para a Folha de Estilo da Página - CSS -->
		<link rel="stylesheet" href="/styles/style.css" />

		<title>Meu Portfólio</title>
	</head>
	<body>
		<!-- Cabeçalho da Página (header) -->
		<header>
			<!-- Div Conteudo do Cabeçalho -->
			<div id="header_content" class="flex">
				<!-- Titulo do Cabeçalho -->
				<div id="titulo">
					<!-- Seu nome -->
					<h1>Lucas Matheus</h1>
				</div>

				<!-- Conteudo do Menu da Página (header) -->
				<div id="menu">
					<!-- Menu da Página -->
					<nav>
						<!-- Marcadores não ordenados + links -->
						<ul id="menu">
							<li>
								<a href="/pages/index.html">Home</a>
							</li>
							<li>
								<a href="/pages/contato.html">Contato</a>
							</li>
						</ul>
					</nav>
				</div>
			</div>
		</header>

		<!-- Seção Principal da Página (main) -->
		<main>
			<div id="contact" class="flex">
				<!-- Seção Formulário de Contato-->
				<form action="#" method="submit">
					<label for="nome">Nome: </label>
					<input
						id="nome"
						type="text"
						name="name"
						placeholder="Digite seu nome"
					/>
					<span id="txtNome"></span>

					<label for="email">Email: </label>
					<input
						id="email"
						type="email"
						name="email"
						placeholder="Digite seu email"
					/>
					<span id="txtEmail"></span>

					<label for="subject">Assunto: </label>
					<input
						id="subject"
						type="text"
						name="subject"
						placeholder="Digite o título da mensagem"
					/>
					<span id="txtSubject"></span>

					<label for="message">Mensagem: </label>
					<textarea
						id="message"
						name="message"
						placeholder="Digite sua mensagem"
					></textarea>

					<button type="submit">Enviar</button>
				</form>

				<!-- Seção do Google Maps -->
				<section id="mapa" class="flex_start">
					
					<div id="endereco">
						<p>Centro</p>
						<p>Rio de Janeiro - RJ</p>
					</div>

					<iframe src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d10394.922500769466!2d-43.17964622636701!3d-22.907465127073277!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1spt-BR!2sbr!4v1736265119621!5m2!1spt-BR!2sbr" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade" id="mapa" tabindex="0">

                    </iframe>
				</section>
			</div>
		</main>

		<!-- Rodapé da Página (footer) -->
		<footer class="flex">
			<!-- Seção de Contato - Redes Sociais-->
			<section id="redes_sociais">
				<a href="https://www.linkedin.com/in/lucas-matheus-lima/" target="_blank">
					<img src="/assets/img/linkedin.svg" alt="LinkedIn" class="social_icon"/>
				</a>
				<a href="https://github.com/lucas-matheus30/" target="_blank">
					<img src="/assets/img/github.svg" alt="Github" class="social_icon"/>
				</a>
			</section>

			<h3>Feito por Lucas Matheus - 2025</h3>
		</footer>
	</body>
</html>
